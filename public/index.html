<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech Cardholder Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #6366f1; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
        .refresh-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: opacity 0.2s; }
        .refresh-btn:hover { opacity: 0.9; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .user-card { background: var(--card); border-radius: 16px; padding: 24px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); border: 1px solid #334155; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
        .avatar { background: #334155; padding: 12px; border-radius: 12px; color: var(--accent); }
        .balance-label { font-size: 14px; color: #94a3b8; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .balance-amount { font-size: 36px; font-weight: 700; margin: 5px 0 20px 0; font-variant-numeric: tabular-nums; }
        .meta-line { display: flex; align-items: center; gap: 10px; color: #94a3b8; font-size: 14px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Fintech Cardholder Dashboard</h1>
            <button class="refresh-btn" onclick="fetchBalances()">
                <i data-lucide="refresh-cw" style="width:16px; height:16px;"></i> Refresh Ledger
            </button>
        </header>

        <div class="grid" id="dashboard-grid">
            </div>
    </div>

    <script>
        async function fetchBalances() {
            try {
                const response = await fetch('/api/cardholders');
                const users = await response.json();
                const grid = document.getElementById('dashboard-grid');
                grid.innerHTML = '';

                users.forEach(user => {
                    const balanceInPounds = (user.balance_cents / 100).toFixed(2);
                    grid.innerHTML += `
                        <div class="user-card">
                            <div class="card-header">
                                <div>
                                    <h2 style="margin:0 0 4px 0; font-size:20px;">${user.name}</h2>
                                    <div class="meta-line"><i data-lucide="mail" style="width:14px;"></i> ${user.email}</div>
                                </div>
                                <div class="avatar"><i data-lucide="credit-card"></i></div>
                            </div>
                            <div>
                                <div class="balance-label">Available Wallet Balance</div>
                                <div class="balance-amount">£${balanceInPounds}</div>
                                <div class="meta-line"><i data-lucide="shield" style="width:14px; color:#10b981;"></i> Status: Active Cardholder</div>
                            </div>
                        </div>
                    `;
                });
                lucide.createIcons();
            } catch (err) {
                console.error("Dashboard render crash:", err);
            }
        }
        window.onload = fetchBalances;
    </script>
</body>
</html>
